name: e2e

# main push + 모든 PR마다 Playwright e2e 실행. ci.yml 과 분리 — e2e 는 ~5분 걸려
# 빠른 피드백을 막지 않도록 병렬 워크플로로 운영.
#
# Firebase Emulator (Auth + Firestore + Storage) 를 띄우고 시드 데이터 주입 후
# Next.js dev 서버 (NEXT_PUBLIC_USE_EMULATOR=true) 로 spec 실행.
#
# 외부 키 불필요 — Auth/Firestore 모두 emulator 모드.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (Firebase Emulator 의존)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # webServer 가 dev:emu 를 띄울 때 placeholder env 가 필요 — emulator 사용이라
          # 실제 키 값은 의미 없음. lib/firebase.ts 가 USE_EMULATOR 분기 시 무시.
          NEXT_PUBLIC_USE_EMULATOR: 'true'
          NEXT_PUBLIC_FIREBASE_API_KEY: 'emulator-placeholder'
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'demo-conatusipsi.firebaseapp.com'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'demo-conatusipsi'
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'demo-conatusipsi.firebasestorage.app'
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '0'
          NEXT_PUBLIC_FIREBASE_APP_ID: '0:0:web:e2e'
          # Admin SDK — Emulator 모드에선 인증 불필요하지만 init 통과를 위해 placeholder
          FIREBASE_ADMIN_PROJECT_ID: 'demo-conatusipsi'
          FIREBASE_ADMIN_CLIENT_EMAIL: 'e2e@example.com'
          FIREBASE_ADMIN_PRIVATE_KEY: '-----BEGIN PRIVATE KEY-----\nplaceholder\n-----END PRIVATE KEY-----\n'
          MASTER_EMAILS: 'admin@example.com'
          # Auth Emulator 호스트 — Admin SDK 가 자동 인지
          FIRESTORE_EMULATOR_HOST: 'localhost:8080'
          FIREBASE_AUTH_EMULATOR_HOST: 'localhost:9099'
          GCLOUD_PROJECT: 'demo-conatusipsi'
        # webServer 가 자동으로 dev:emu (linux 에선 bash ./scripts/dev-with-emulator.sh) 실행
        run: npm run test:e2e

      - name: Upload Playwright report (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
