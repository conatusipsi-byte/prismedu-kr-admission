name: CI

# main 브랜치 push + 모든 PR마다 자동 실행.
# typecheck → lint → test → build 순서. 하나라도 실패하면 머지 차단.
#
# 외부 키 없이 동작 — Firebase Admin SDK는 placeholder로 fallback (lib/firebase.ts).
# 실제 라우트 핸들러 호출이 필요한 테스트(통합)는 별도 staging 환경에서.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동시 실행 제한 — 새 commit이 들어오면 진행 중이던 워크플로 취소 (시간 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm test -- --run

      - name: Production build
        # NEXT_TELEMETRY_DISABLED — Vercel telemetry 차단 (CI 빌드 노이즈)
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Firebase placeholder — env 미주입 시 lib/firebase.ts 가 console.error 후 fallback.
          # build prerender는 통과해야 하므로 placeholder 주입.
          NEXT_PUBLIC_FIREBASE_API_KEY: 'ci-placeholder'
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'ci.firebaseapp.com'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'ci-placeholder'
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'ci.firebasestorage.app'
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '0'
          NEXT_PUBLIC_FIREBASE_APP_ID: '0:0:web:ci'
        run: npm run build

      - name: Build artifact size summary
        if: success()
        run: |
          echo "### Build size summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ | awk '{print "- Total: " $1}' >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/ 2>/dev/null | awk '{print "- Static: " $1}' >> $GITHUB_STEP_SUMMARY
          du -sh .next/server/ 2>/dev/null | awk '{print "- Server: " $1}' >> $GITHUB_STEP_SUMMARY
