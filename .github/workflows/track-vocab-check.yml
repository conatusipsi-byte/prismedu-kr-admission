name: trackPattern 어휘 자동 점검

# ETL 시즌(7~9월) 시작 시점에 자동 실행 — operations.md §6.4 자동화 워크플로
# 실행 결과 신규 어휘 발견 시 PR draft 자동 생성. 운영자 검수 후 머지.
#
# cron 표기: "분 시 일 월 요일" (UTC)
# 09:00 UTC = 18:00 KST — 운영자 업무 시간 종료 직후 PR 생성

on:
  schedule:
    - cron: "0 9 1 7 *"   # 7월 1일
    - cron: "0 9 1 8 *"   # 8월 1일
    - cron: "0 9 1 9 *"   # 9월 1일
  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유"
        required: false
        default: "수동 점검"

permissions:
  contents: write
  pull-requests: write

jobs:
  vocab-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # peter-evans/create-pull-request 가 base 비교에 사용

      - name: Node 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Firebase Admin 자격증명 작성
        run: |
          mkdir -p /tmp/secrets
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/secrets/sa.json
          chmod 600 /tmp/secrets/sa.json

      - name: 어휘 점검 스크립트 실행
        id: vocab
        run: |
          set +e
          npx tsx scripts/update-track-vocab-fixtures.ts | tee /tmp/vocab-output.txt
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          if [ "$EXIT" = "1" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT" = "0" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=error" >> "$GITHUB_OUTPUT"
            exit "$EXIT"
          fi
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/secrets/sa.json

      - name: 회귀 테스트 (변경 시에만)
        if: steps.vocab.outputs.changed == 'true'
        id: regression
        continue-on-error: true
        run: |
          npm run test -- trackPattern-coverage min-req-classifier 2>&1 | tee /tmp/test-output.txt

      - name: PR 본문 준비
        if: steps.vocab.outputs.changed == 'true'
        run: |
          MONTH=$(date -u +"%Y-%m")
          {
            echo "## 🔍 trackPattern 어휘 신규 발견 — $MONTH"
            echo ""
            echo "ETL 시즌 자동 점검에서 모집요강 ○○계열 표현 추출 결과 어휘 보강이 필요합니다."
            echo ""
            echo "## 📊 점검 결과"
            echo ""
            echo '```'
            head -n 12 /tmp/vocab-output.txt
            echo '```'
            echo ""
            echo "## 🆕 신규 어휘"
            echo ""
            echo '```'
            sed -n '/🆕 신규 어휘/,/📝 갱신된 파일/p' /tmp/vocab-output.txt
            echo '```'
            echo ""
            echo "## ✅ 회귀 테스트"
            echo ""
            if [ "${{ steps.regression.outcome }}" = "success" ]; then
              echo "- \`trackPattern-coverage.test.ts\` ✅"
              echo "- \`min-req-classifier.test.ts\` ✅"
              echo ""
              echo "→ 본 PR 머지 시 즉시 회귀 통과."
            else
              echo "- ❌ 회귀 테스트 실패"
              echo ""
              echo '```'
              tail -n 50 /tmp/test-output.txt
              echo '```'
              echo ""
              echo "→ **머지 전 반드시 회귀 통과시킬 것**. 자동 추가된 fixture 텍스트 검수 필요."
            fi
            echo ""
            echo "## 📋 검수 절차 (5분)"
            echo ""
            echo "1. **신규 어휘 의미 확인** — 단순 학과 분류 표시(\"본 학과는 X계열로 분류\")가 아니라"
            echo "   실제 분기 기준(\"X계열은 Y, Z계열은 W\")에 등장하는 어휘인지 확인"
            echo "2. **자동 추가 fixture 검수** — \`lib/admission/__tests__/fixtures/sample-min-reqs.ts\`"
            echo "   하단의 자동 추가 블록(\"자동 추가, 검수 필요\" 주석)에서 텍스트가 모집요강 패턴에 부합하는지"
            echo "3. **분류기 회귀 케이스 추가** — 신규 어휘에 대해 \`min-req-classifier.test.ts\` 의"
            echo "   conditional describe 블록에 케이스 1~2개 추가"
            echo "4. **회귀 통과 확인** — \`npm run test\`"
            echo "5. **Ready for review** — draft 상태 해제 + 운영 리드 1명 review request"
            echo ""
            echo "## 📁 변경 파일"
            echo ""
            echo "- \`lib/admission/min-req-classifier.ts\` — TRACK_PATTERN_VOCAB 갱신"
            echo "- \`lib/admission/__tests__/fixtures/sample-min-reqs.ts\` — 신규 어휘별 샘플 추가"
            echo ""
            echo "---"
            echo ""
            echo "_본 PR은 \`.github/workflows/track-vocab-check.yml\` 에서 자동 생성되었습니다._"
            echo "_관련 운영 매뉴얼: \`docs/operations.md\` §6.4_"
          } > /tmp/pr-body.md

      - name: PR draft 생성
        if: steps.vocab.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/track-vocab-${{ github.run_id }}
          base: main
          draft: true
          commit-message: |
            chore(etl): trackPattern 어휘 자동 갱신

            Auto-generated by .github/workflows/track-vocab-check.yml
          title: "🔍 [자동] trackPattern 어휘 신규 발견 - ${{ github.run_id }}"
          body-path: /tmp/pr-body.md
          labels: |
            etl-vocab-review
            automated
            needs-review

      - name: 변경 없음 — 종료 로그
        if: steps.vocab.outputs.changed == 'false'
        run: |
          echo "✅ trackPattern 어휘 변경 없음 — 모든 ○○계열 표현이 커버됨"
          echo "다음 자동 점검: $(date -u -d 'next month' +'%Y-%m-01 09:00 UTC')"
